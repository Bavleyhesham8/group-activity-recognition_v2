# Configuration for Group Activity Recognition
data:
  main_anno_root: "./data/raw/volleyball/videos"
  tracking_root: "./data/raw/volleyball/tracking_annotations"
  output_base: "./processed"
  checkpoints_dir: "./outputs/checkpoints"

training:
  stage1:
    epochs: 30
    lr: 0.0001
    batch_size: 32
  stage2:
    epochs: 50
    lr: 0.0001
    batch_size: 32
  num_workers: 4
  standing_keep: 0.15
  standing_thresh: 0.5

model:
  feat_dim: 512
  person_hidden: 512
  proj_dim: 256
  fc_dim: 512
  group_hidden: 256
  num_players: 12
  num_frames: 9
  num_subframes: 20
  num_group_classes: 8
  num_action_classes: 10
  use_temporal_attn: true
